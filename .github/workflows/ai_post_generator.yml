name: Generate AI Post
on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Post Topic'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-generativeai

      - name: Run Generator Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOPIC: ${{ github.event.inputs.topic }}
        run: python generate_post.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main  # <--- ADD THIS LINE
          branch: "drafts/ai-post" # This is the "temporary" branch for the PR
          title: "Review AI Post: ${{ github.event.inputs.topic }}"
          commit-message: "New AI draft generated"
          body: "Review the new post in the Files changed tab."